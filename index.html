<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Shop Boolzando</title>
</head>
<body>
    <!-- main -->
    <main>
        <!-- container -->
        <div class="container">
            <!-- rows -->
            <div class="row-1">
                <!-- products -->
                <div class="square 1">
                    <div class="product">
                        <img class="image" src="img/1.webp" alt="img1">
                        <img class="image-hidden" src="img/1b.webp" alt="img1b">
                        <span class="heart-icon">&hearts;</span>
                        <span class="discount badge">-50%</span>
                        <span class="sustainability badge">Sostenibilità</span>
                    </div>
                    <div class="description">
                        <div class="brand">Levi's</div>
                        <div class="name">RELAXED FIT TEE UNISEX</div>
                        <div class="price">
                            14,99€
                            <del class="old-price">29.99€</del>
                        </div>
                    </div>
                </div>
                <div class="square 2">
                    <div class="product">
                        <img class="image" src="img/2.webp" alt="img2">
                        <img class="image-hidden" src="img/2b.webp" alt="img2b">
                        <span class="heart-icon">&hearts;</span>
                        <span class="discount badge">-30%</span>
                    </div>
                    <div class="description">
                        <div class="brand">Guess</div>
                        <div class="name">ROSES TEE</div>
                        <div class="price">
                            20,99€
                            <del class="old-price">29.99€</del>
                        </div>
                    </div>
                </div>
                <div class="square 3">
                    <div class="product">
                        <img class="image" src="img/3.jpg" alt="img3">
                        <img class="image-hidden" src="img/3b.jpg" alt="img3b">
                        <span class="heart-icon">&hearts;</span>
                    </div>
                    <div class="description">
                        <div class="brand">Come Zucchero Filato</div>
                        <div class="name">Voglia di colori pastello</div>
                        <div class="price">
                            129,99€
                        </div>
                    </div>
                </div>
                <!-- / products -->
            </div>
            <div class="row-2">
                <!-- product -->
                <div class="square 4">
                    <div class="product">
                        <img class="image" src="img/4.webp" alt="img4">
                        <img class="image-hidden" src="img/4b.webp" alt="img4b">
                        <span class="heart-icon">&hearts;</span>
                    </div>
                    <div class="description">
                        <div class="brand">Levi's</div>
                        <div class="name">TEE UNISEX</div>
                        <div class="price">
                            14,99€
                            <del class="old-price">29.99€</del>
                        </div>
                    </div>
                </div>
                <div class="square 5">
                    <div class="product">
                        <img class="image" src="img/5.webp" alt="img5">
                        <img class="image-hidden" src="img/5b.webp" alt="img5b">
                        <span class="heart-icon">&hearts;</span>
                    </div>
                    <div class="description">
                        <div class="brand">Maya Deluxe</div>
                        <div class="name">STRIPE BODICE</div>
                        <div class="price">
                            99,99€
                        </div>
                    </div>
                </div>
                <div class="square 6">
                    <div class="product">
                        <img class="image" src="img/6.webp" alt="img6">
                        <img class="image-hidden" src="img/6b.webp" alt="img6b">
                        <span class="heart-icon">&hearts;</span>
                        <span id="special" class="sustainability badge">Sostenibilità</span>
                    </div>
                    <div class="description">
                        <div class="brand">Esprit</div>
                        <div class="name">Maglione - Black</div>
                        <div class="price">
                            29,99€
                        </div>
                    </div>
                </div>
                <!-- / product -->
            </div>
            <!-- / rows -->
        </div>
        <!-- / container -->
    </main>
    <!-- / main  -->
</body>
</html>
